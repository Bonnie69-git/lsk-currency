<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LSK Currency — refined</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; -webkit-tap-highlight-color:transparent; }
body { background:#0e0e10; font-family:'Inter',sans-serif; padding:40px 16px 80px; display:flex; justify-content:center; }
.frame-wrap { width:390px; }
.frame-label { color:#8a8a90; font-size:12px; font-weight:500; letter-spacing:.4px; margin-bottom:10px; text-align:center; text-transform:uppercase; }

.app {
  --bg:#000000;
  --card:#161618;
  --card-in:#0a0a0b;
  --line: rgba(255,255,255,0.06);
  --t:#00e5cc;
  --t-deep:#00b39e;
  --text:#f5f5f7;
  --sub:#8e8e93;
  --sub2:#c7c7cc;
  --up:#32d74b;
  --r-lg:24px;
  --r-md:18px;
  --r-full:999px;
  background:var(--bg);
  border-radius:32px;
  overflow:hidden;
  border:1px solid #1c1c1e;
}

/* HEADER */
.top { padding:16px 20px 14px; display:flex; align-items:center; justify-content:space-between; }
.brand { display:flex; align-items:center; gap:10px; }
.mark { width:30px; height:30px; border-radius:9px; background:linear-gradient(160deg,var(--t),var(--t-deep)); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; color:#00251f; }
.brand-name { font-size:14px; font-weight:600; color:var(--text); letter-spacing:-.1px; }
.brand-sub { font-size:9px; color:var(--sub); letter-spacing:1px; text-transform:uppercase; margin-top:1px; }
.status { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--sub); }
.dot { width:6px; height:6px; border-radius:50%; background:var(--up); }

/* CONVERTER CARD */
.card { background:var(--card); border-radius:var(--r-lg); margin:4px 16px 12px; padding:6px; }
.row { display:flex; align-items:center; justify-content:space-between; padding:16px 14px; gap:12px; }
.row-label { font-size:10px; font-weight:600; color:var(--sub); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.amount { font-size:30px; font-weight:600; color:var(--text); letter-spacing:-.5px; background:none; border:none; outline:none; width:100%; font-family:'Inter',sans-serif; }
.amount.result { color:var(--t); }

.pill {
  display:flex; align-items:center; gap:8px;
  background:var(--card-in);
  border-radius:var(--r-full);
  padding:8px 14px 8px 8px;
  flex-shrink:0;
}
.flag-badge { width:26px; height:26px; border-radius:50%; background:#1f1f22; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:var(--sub2); letter-spacing:-.2px; }
.pill-code { font-size:14px; font-weight:600; color:var(--text); }
.pill-chev { font-size:9px; color:var(--sub); margin-left:1px; }

.divider-row { display:flex; align-items:center; padding:0 14px; }
.divider-line { flex:1; height:1px; background:var(--line); }
.swap { width:34px; height:34px; border-radius:50%; background:var(--t); display:flex; align-items:center; justify-content:center; color:#00251f; font-size:14px; margin:0 10px; flex-shrink:0; }

.rate-note { text-align:center; font-size:12px; color:var(--sub); margin:4px 0 14px; }
.rate-note b { color:var(--sub2); font-weight:500; }

/* ACTIONS — Apple style: full pill primary + circular secondary */
.actions { display:flex; gap:10px; margin:0 16px 8px; }
.btn-copy {
  flex:1;
  background:var(--t);
  border:none;
  border-radius:var(--r-full);
  padding:15px 0;
  font-size:15px;
  font-weight:600;
  color:#00251f;
  font-family:'Inter',sans-serif;
  letter-spacing:-.1px;
}
.btn-fav {
  width:50px; height:50px;
  border-radius:50%;
  background:var(--card);
  border:none;
  color:var(--sub2);
  font-size:18px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}

/* LIST */
.list-wrap { margin:20px 16px 20px; }
.list-title { font-size:11px; font-weight:600; color:var(--sub); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; padding:0 4px; }
.list { background:var(--card); border-radius:var(--r-lg); overflow:hidden; }
.item { display:flex; align-items:center; justify-content:space-between; padding:13px 16px; }
.item + .item { border-top:1px solid var(--line); }
.item-l { display:flex; align-items:center; gap:12px; }
.item-badge { width:32px; height:32px; border-radius:50%; background:#1f1f22; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:var(--sub2); }
.item-name { font-size:14px; color:var(--text); font-weight:500; }
.item-val { font-size:15px; color:var(--text); font-weight:600; font-variant-numeric:tabular-nums; }
</style>
</head>
<body>
<div class="frame-wrap">
  <div class="frame-label">Refined — тот же стиль, апельные скругления</div>
  <div class="app">

    <div class="top">
      <div class="brand">
        <div class="mark">$</div>
        <div>
          <div class="brand-name">LSK Currency</div>
          <div class="brand-sub">Live exchange rates</div>
        </div>
      </div>
      <div class="status"><div class="dot"></div>Обновлено сейчас</div>
    </div>

    <div class="card">
      <div class="row">
        <div style="flex:1">
          <div class="row-label">Отдаёте</div>
          <input class="amount" value="1">
        </div>
        <div class="pill">
          <div class="flag-badge">US</div>
          <div class="pill-code">USD</div>
          <div class="pill-chev">▾</div>
        </div>
      </div>

      <div class="divider-row">
        <div class="divider-line"></div>
        <div class="swap">⇅</div>
        <div class="divider-line"></div>
      </div>

      <div class="row">
        <div style="flex:1">
          <div class="row-label">Получаете</div>
          <div class="amount result">0.8730</div>
        </div>
        <div class="pill">
          <div class="flag-badge">EU</div>
          <div class="pill-code">EUR</div>
          <div class="pill-chev">▾</div>
        </div>
      </div>
    </div>

    <div class="rate-note">1 USD = <b>0.8730</b> EUR</div>

    <div class="actions">
      <button class="btn-copy">Копировать</button>
      <button class="btn-fav">☆</button>
    </div>

    <div class="list-wrap">
      <div class="list-title">Сразу во всех валютах</div>
      <div class="list">
        <div class="item">
          <div class="item-l"><div class="item-badge">UA</div><div class="item-name">Гривна</div></div>
          <div class="item-val">44.79</div>
        </div>
        <div class="item">
          <div class="item-l"><div class="item-badge">GE</div><div class="item-name">Лари</div></div>
          <div class="item-val">2.63</div>
        </div>
        <div class="item">
          <div class="item-l"><div class="item-badge">RU</div><div class="item-name">Рубль</div></div>
          <div class="item-val">77.70</div>
        </div>
        <div class="item">
          <div class="item-l"><div class="item-badge">GB</div><div class="item-name">Фунт</div></div>
          <div class="item-val">0.7420</div>
        </div>
        <div class="item">
          <div class="item-l"><div class="item-badge">CN</div><div class="item-name">Юань</div></div>
          <div class="item-val">6.78</div>
        </div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
